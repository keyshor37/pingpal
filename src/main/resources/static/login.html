<!DOCTYPE html><html><head><title>PingPal - Login</title><style>body{font-family:Arial;margin:0;background:#1a1a2e;color:white;}.nav{background:#16213e;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;}.nav h1{color:#00d4ff;margin:0;}.nav a{color:white;text-decoration:none;margin-left:20px;}.container{max-width:500px;margin:80px auto;background:#16213e;padding:40px;border-radius:10px;}h2{color:#00d4ff;text-align:center;margin-bottom:30px;}input{width:100%;padding:12px;margin:8px 0;background:#0f3460;border:1px solid #00d4ff;border-radius:5px;color:white;box-sizing:border-box;font-size:15px;}button{width:100%;padding:15px;background:#00d4ff;color:#1a1a2e;border:none;border-radius:5px;font-size:16px;cursor:pointer;margin-top:10px;font-weight:bold;}.msg{text-align:center;margin-top:15px;padding:10px;border-radius:5px;}.success{background:#1e8449;}.error{background:#922b21;}.link{text-align:center;margin-top:20px;}.link a{color:#00d4ff;}</style></head><body><div class=nav><h1>PingPal</h1><div><a href=/index.html>Home</a><a href=/login.html>Login</a><a href=/register.html>Register</a><a href=/players.html>Find Players</a><a href=/coaches.html>Coaches</a><a href=/sessions.html>Sessions</a></div></div><div class=container><h2>Welcome Back</h2><input type=email id=email placeholder=Email /><input type=password id=pass placeholder=Password /><button onclick=doLogin()>Login</button><div id=msg class=msg style=display:none></div><div id=welcome style=display:none><h2 id=wname style=color:#00d4ff></h2><p id=wcity style=color:#aaa></p><p>Skill Level: <strong id=wskill style=color:#00d4ff></strong></p><a href=/players.html><button>Find Players</button></a><a href=/coaches.html><button style=background:#0f3460;color:white;margin-top:10px>Find Coaches</button></a></div><div class=link><p>No account? <a href=/register.html>Register here</a></p></div></div><script>async function doLogin(){var b={email:document.getElementById('email').value,password:document.getElementById('pass').value};var r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});var d=await r.json();var m=document.getElementById('msg');if(r.ok){m.style.display='none';document.getElementById('welcome').style.display='block';document.getElementById('wname').textContent='Welcome, '+d.displayName+'!';document.getElementById('wcity').textContent='City: '+d.city;document.getElementById('wskill').textContent=d.skillLevel;}else{m.style.display='block';m.className='msg error';m.textContent='Invalid email or password';}}</script></body></html>
