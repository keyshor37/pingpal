<!DOCTYPE html><html><head><title>PingPal - Coaches</title><style>body{font-family:Arial;margin:0;background:#1a1a2e;color:white}.nav{background:#16213e;padding:15px 30px;display:flex;justify-content:space-between;align-items:center}.nav h1{color:#00d4ff;margin:0}.nav a{color:white;text-decoration:none;margin-left:20px}.container{max-width:900px;margin:40px auto;padding:20px}h2{color:#00d4ff}.search{background:#16213e;padding:20px;border-radius:10px;margin-bottom:30px;display:flex;gap:10px}input{padding:12px;background:#0f3460;border:1px solid #00d4ff;border-radius:5px;color:white;flex:1}button{padding:12px 25px;background:#00d4ff;color:#1a1a2e;border:none;border-radius:5px;cursor:pointer;font-size:16px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}.card{background:#16213e;padding:25px;border-radius:10px;border-left:4px solid #00d4ff}.card h3{color:#00d4ff;margin:0 0 10px 0}.rate{color:#00d4ff;font-size:22px;font-weight:bold;margin:10px 0}.badge{background:#0f3460;display:inline-block;padding:4px 12px;border-radius:20px;font-size:13px;margin:3px}.btn{width:100%;padding:10px;background:#00d4ff;color:#1a1a2e;border:none;border-radius:5px;cursor:pointer;font-size:15px;margin-top:15px;font-weight:bold}</style></head><body><div class=nav><h1>PingPal</h1><div><a href=/index.html>Home</a><a href=/login.html>Login</a><a href=/register.html>Register</a><a href=/players.html>Find Players</a><a href=/coaches.html>Coaches</a><a href=/sessions.html>Sessions</a></div></div><div class=container><h2>Find a Coach</h2><div class=search><input type=text id=city placeholder="Search by city..."><button onclick=search()>Search</button><button onclick=load() style="background:#0f3460;color:white;margin-left:10px">Show All</button></div><div class=grid id=list></div></div><script>function load(){fetch("/api/coaches").then(r=>r.json()).then(show)}function search(){var c=document.getElementById("city").value;fetch("/api/coaches"+(c?"?city="+c:"")).then(r=>r.json()).then(show)}function show(d){document.getElementById("list").innerHTML=d.length?d.map(c=>"<div class=card><h3>"+c.name+"</h3><p>"+c.city+"</p><p>"+c.bio+"</p><span class=badge>"+c.experienceYears+" yrs</span><span class=badge>"+c.speciality+"</span><div class=rate>EUR "+c.hourlyRate+"/hr</div><button class=btn onclick=\"location='/book.html?id="+c.id+"&name="+encodeURIComponent(c.name)+"&rate="+c.hourlyRate+"&city="+encodeURIComponent(c.city)+"'\">Book Session</button></div>").join(""):"<p>No coaches found.</p>"}load()</script></body></html>
