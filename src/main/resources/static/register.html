<!DOCTYPE html><html><head><title>PingPal - Register</title><style>body{font-family:Arial;margin:0;background:#1a1a2e;color:white;}.nav{background:#16213e;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;}.nav h1{color:#00d4ff;margin:0;}.nav a{color:white;text-decoration:none;margin-left:20px;}.container{max-width:500px;margin:50px auto;background:#16213e;padding:40px;border-radius:10px;}h2{color:#00d4ff;text-align:center;}input,select{width:100%;padding:12px;margin:8px 0;background:#0f3460;border:1px solid #00d4ff;border-radius:5px;color:white;box-sizing:border-box;}button{width:100%;padding:15px;background:#00d4ff;color:#1a1a2e;border:none;border-radius:5px;font-size:16px;cursor:pointer;}.msg{text-align:center;margin-top:15px;padding:10px;border-radius:5px;}.success{background:#1e8449;}.error{background:#922b21;}</style></head><body><div class='nav'><h1>PingPal</h1><div><a href='/index.html'>Home</a><a href='/register.html'>Register</a><a href='/players.html'>Find Players</a><a href='/sessions.html'>Sessions</a></div></div><div class='container'><h2>Create Account</h2><input type='text' id='name' placeholder='Display Name'/><input type='email' id='email' placeholder='Email'/><input type='password' id='pass' placeholder='Password'/><input type='text' id='city' placeholder='City'/><select id='skill'><option value='1'>Level 1 - Beginner</option><option value='2'>Level 2</option><option value='3'>Level 3 - Intermediate</option><option value='4'>Level 4</option><option value='5'>Level 5 - Advanced</option><option value='6'>Level 6</option><option value='7'>Level 7 - National</option></select><button onclick='reg()'>Register</button><div id='msg' class='msg' style='display:none'></div></div><script>async function reg(){const b={email:document.getElementById('email').value,password:document.getElementById('pass').value,displayName:document.getElementById('name').value,city:document.getElementById('city').value,skillLevel:parseInt(document.getElementById('skill').value)};const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});const t=await r.text();const m=document.getElementById('msg');m.style.display='block';m.className='msg '+(r.ok?'success':'error');m.textContent=r.ok?'Registered! Redirecting...':t;if(r.ok)setTimeout(()=>location='/players.html',2000);}</script></body></html>
