<!DOCTYPE html><html><head><title>PingPal - Sessions</title><style>body{font-family:Arial;margin:0;background:#1a1a2e;color:white}.nav{background:#16213e;padding:15px 30px;display:flex;justify-content:space-between;align-items:center}.nav h1{color:#00d4ff;margin:0}.nav a{color:white;text-decoration:none;margin-left:20px}.container{max-width:900px;margin:40px auto;padding:20px}h2{color:#00d4ff}.form{background:#16213e;padding:30px;border-radius:10px;margin-bottom:30px}input{width:100%;padding:12px;margin:8px 0;background:#0f3460;border:1px solid #00d4ff;border-radius:5px;color:white;box-sizing:border-box}button{padding:12px 25px;background:#00d4ff;color:#1a1a2e;border:none;border-radius:5px;cursor:pointer;font-size:16px;margin-top:10px;font-weight:bold}.ok{background:#1e8449;padding:12px;border-radius:5px;margin-top:10px}.er{background:#922b21;padding:12px;border-radius:5px;margin-top:10px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:20px}.card{background:#16213e;padding:20px;border-radius:10px;border-left:4px solid #00d4ff}.card h3{color:#00d4ff;margin:0 0 8px 0}.card p{margin:4px 0;font-size:13px;color:#aaa}</style></head><body><div class=nav><h1>PingPal</h1><div><a href=/index.html>Home</a><a href=/login.html>Login</a><a href=/register.html>Register</a><a href=/players.html>Find Players</a><a href=/coaches.html>Coaches</a><a href=/sessions.html>Sessions</a></div></div><div class=container><h2>Sessions</h2><div class=form><h3 style="color:#00d4ff;margin-top:0">Create New Session</h3><input type=text id=title placeholder="Session Title"><input type=text id=venue placeholder="Venue Name"><input type=text id=city placeholder="City"><input type=datetime-local id=date><input type=number id=maxp placeholder="Max Players" min=2 max=20><input type=text id=creator placeholder="Your Name"><button onclick=createSession()>Create Session</button><div id=msg style=display:none></div></div><h2>Upcoming Sessions</h2><div class=grid id=list><p>Loading...</p></div></div><script>async function createSession(){var t=document.getElementById("title").value;var v=document.getElementById("venue").value;var c=document.getElementById("city").value;var d=document.getElementById("date").value;var m=document.getElementById("maxp").value;var cr=document.getElementById("creator").value;var msg=document.getElementById("msg");if(!t||!v||!c||!d||!m){msg.style.display="block";msg.className="er";msg.textContent="Please fill in all fields!";return;}var r=await fetch("/api/sessions",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({title:t,venueName:v,city:c,scheduledAt:d,maxPlayers:parseInt(m),creatorName:cr})});var txt=await r.text();msg.style.display="block";if(r.ok){msg.className="ok";msg.textContent="Session created: "+t;loadSessions();}else{msg.className="er";msg.textContent=txt;}}async function loadSessions(){var r=await fetch("/api/sessions");var s=await r.json();var div=document.getElementById("list");if(!s.length){div.innerHTML="<p>No sessions yet. Create one above!</p>";return;}div.innerHTML=s.map(x=>"<div class=card><h3>"+x.title+"</h3><p>Venue: "+x.venueName+"</p><p>City: "+x.city+"</p><p>Date: "+x.scheduledAt+"</p><p>Max Players: "+x.maxPlayers+"</p><p style=color:#00d4ff>By: "+(x.creatorName||"Anonymous")+"</p></div>").join("");}loadSessions();</script></body></html>
