<!DOCTYPE html><html><head><title>PingPal - Players</title><style>body{font-family:Arial;margin:0;background:#1a1a2e;color:white;}.nav{background:#16213e;padding:15px 30px;display:flex;justify-content:space-between;align-items:center;}.nav h1{color:#00d4ff;margin:0;}.nav a{color:white;text-decoration:none;margin-left:20px;}.container{max-width:900px;margin:40px auto;padding:20px;}h2{color:#00d4ff;}.search{background:#16213e;padding:20px;border-radius:10px;margin-bottom:30px;display:flex;gap:10px;}input{padding:12px;background:#0f3460;border:1px solid #00d4ff;border-radius:5px;color:white;flex:1;}button{padding:12px 25px;background:#00d4ff;color:#1a1a2e;border:none;border-radius:5px;cursor:pointer;font-size:16px;}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;}.card{background:#16213e;padding:20px;border-radius:10px;border-left:4px solid #00d4ff;}.card h3{color:#00d4ff;margin:0 0 10px 0;}</style></head><body><div class='nav'><h1>PingPal</h1><div><a href='/index.html'>Home</a><a href='/register.html'>Register</a><a href='/players.html'>Find Players</a><a href='/sessions.html'>Sessions</a></div></div><div class='container'><h2>Find Players</h2><div class='search'><input type='text' id='city' placeholder='Search by city...'><button onclick='search()'>Search</button><button onclick='load()' style='background:#0f3460;color:white;margin-left:10px;'>Show All</button></div><div class='grid' id='list'></div></div><script>async function load(){const r=await fetch('/api/players');show(await r.json());}async function search(){const c=document.getElementById('city').value;const r=await fetch('/api/players'+(c?'?city='+c:''));show(await r.json());}function show(p){document.getElementById('list').innerHTML=p.length?p.map(x=>'<div class=card><h3>'+x.displayName+'</h3><p>City: '+x.city+'</p><p>Skill: '+x.skillLevel+'</p></div>').join(''):'<p>No players found.</p>';}load();</script></body></html>
